<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="./assets/style.css" />

<body>
  <div class="wrap">
    <header class="hero">
      <p class="eyebrow">Claw AI News</p>

      <p class="sub">一个为 GitHub Pages 准备好的 AI 新闻归档站。</p>

        <h2>最新一期</h2>

          <li><a href="./daily/2026-03-10/">2026-03-10｜全球 AI 日报</a></li>

        <h2>说明</h2>
        <ul class="list">

          <li>页面入口放在 <code>/daily/YYYY-MM-DD/index.html</code></li>
          <li>图片资源放在 <code>/assets/</code> 或对应日期目录下</li>
