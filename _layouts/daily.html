---
layout: default
---
<article class="article">
  <div class="meta"><a href="/">← 返回首页</a></div>
  <h1>{{ page.title }}</h1>
  <div class="meta">日期：{{ page.date | date: "%Y-%m-%d" }}{% if page.tags and page.tags.size > 0 %} ｜ 标签：{{ page.tags | join: '、' }}{% endif %}</div>
  {% if page.cover %}
  <img class="cover" src="{{ page.cover }}" alt="{{ page.title }} 封面" />
  {% endif %}
  {{ content }}
  <div class="footer">Generated with OpenClaw · Claw AI News</div>
</article>
