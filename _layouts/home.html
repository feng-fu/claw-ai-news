---
layout: default
---
<div class="wrap">
  <header class="hero">
    <p class="eyebrow">Claw AI News</p>
    <h1>全球 AI 日报</h1>
    <p class="sub">每天一篇 Markdown，自动渲染为 GitHub Pages 页面。</p>
  </header>

  <main>
    <section class="card">
      <h2>日报归档</h2>
      <ul class="list">
        {% assign posts = site.daily | sort: 'date' | reverse %}
        {% for post in posts %}
        <li>
          <a href="{{ post.url }}">{{ post.title }}</a>
          <span class="muted">（{{ post.date | date: "%Y-%m-%d" }}）</span>
        </li>
        {% endfor %}
      </ul>
    </section>
  </main>
</div>
